name: 自动打包退税系统为EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber pdf2image pytesseract pillow openpyxl pandas pyinstaller

      - name: 使用PyInstaller打包
        run: |
          pyinstaller --onefile tax_refund_gui.py

      - name: 上传生成的EXE文件
        uses: actions/upload-artifact@v4
        with:
          name: 退税系统-EXE
          path: dist/tax_refund_gui.exe
